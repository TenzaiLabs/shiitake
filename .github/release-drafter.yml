name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - feature
      - enhancement
  - title: '🐛 Fixes'
    labels:
      - fix
      - bug
  - title: '🧰 Maintenance'
    labels:
      - chore
      - refactor
      - ci
      - docs
      - dependencies
      - test

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bug
      - chore
      - refactor
      - ci
      - docs
      - dependencies
      - test
  default: patch

autolabeler:
  - label: 'docs'
    files:
      - '**/*.md'
  - label: 'ci'
    files:
      - '.github/**'
  - label: 'dependencies'
    files:
      - '**/Cargo.toml'
      - 'Cargo.lock'
  - label: 'test'
    files:
      - '**/tests/**'
  - label: 'fix'
    title:
      - '/^fix/i'
  - label: 'feature'
    title:
      - '/^(feat|feature)/i'
  - label: 'chore'
    title:
      - '/^(chore|refactor)/i'

template: |
  ## What's changed

  $CHANGES

  **Full changelog**: https://github.com/$OWNER/$REPO/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
