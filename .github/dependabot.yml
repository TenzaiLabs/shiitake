version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (pins are immutable, so they need
  # a bumper or they silently go stale).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
  # Keep the digest-pinned base images current (Dockerfile.server,
  # Dockerfile.worker, tests/Dockerfile.worker).
  - package-ecosystem: docker
    directories:
      - /
      - /tests
    schedule:
      interval: weekly
    groups:
      base-images:
        patterns:
          - "*"
