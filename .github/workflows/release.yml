name: 🚀 Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  image:
    name: 🐳 ${{ matrix.component }} image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        component:
          - server
          - worker
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - component: server
            dockerfile: Dockerfile.server
          - component: worker
            dockerfile: Dockerfile.worker
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 🔢 Stamp version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          v="${TAG#v}"
          sed -i "s/^version = \".*\"/version = \"$v\"/" Cargo.toml
          awk -v v="$v" '/^name = "shiitake-/{print; getline; sub(/^version = .*/, "version = \"" v "\""); print; next} {print}' Cargo.lock > Cargo.lock.tmp
          mv Cargo.lock.tmp Cargo.lock
      - name: 🔤 Resolve image name
        id: image
        env:
          REPO: ${{ github.repository }}
          COMPONENT: ${{ matrix.component }}
        run: echo "image=${REGISTRY}/${REPO,,}-${COMPONENT}" >> "$GITHUB_OUTPUT"
      - name: 🧱 Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: 🔑 Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏷️ Image labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ steps.image.outputs.image }}
      - name: 🚀 Build & push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
      - name: 🧮 Platform tag
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
      - name: 📤 Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"
      - name: ⬆️ Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digest-${{ matrix.component }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: 🧩 Combine + push ${{ matrix.component }} manifest
    runs-on: ubuntu-24.04
    needs: image
    strategy:
      fail-fast: false
      matrix:
        component:
          - server
          - worker
    steps:
      - name: 🔤 Resolve image name
        id: image
        env:
          REPO: ${{ github.repository }}
          COMPONENT: ${{ matrix.component }}
        run: echo "image=${REGISTRY}/${REPO,,}-${COMPONENT}" >> "$GITHUB_OUTPUT"
      - name: 📥 Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.component }}-*
          merge-multiple: true
      - name: 🧱 Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: 🔑 Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏷️ Image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: 🧩 Create manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: ✅ Inspect
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"
