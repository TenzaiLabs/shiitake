name: 📝 Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  draft:
    name: 📋 Update release draft
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 🔢 Resolve version from Cargo.toml
        id: version
        # The in-code version is the source of truth (enforced by
        # check-version.sh), and the release tag must match it — so draft that
        # exact version instead of letting Release Drafter infer one from labels
        # (which bumps from the last tag and diverged: it drafted v0.1.2 while the
        # code was already at v0.2.0).
        run: echo "version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: 📝 Release Drafter
        uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7
        with:
          config-name: release-drafter.yml
          version: ${{ steps.version.outputs.version }}

  autolabel:
    name: 🏷️ Autolabel PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 🏷️ Autolabeler
        uses: release-drafter/release-drafter/autolabeler@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7
        with:
          config-name: release-drafter.yml
