name: 🧪 Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: 🚀 End-to-end (k3d)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🧰 Install tools (mise)
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔨 Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          load: true
          tags: shiitake-server:e2e
          cache-from: type=gha,scope=shiitake-server
          cache-to: type=gha,mode=max,scope=shiitake-server

      - name: 🔨 Build worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: tests/Dockerfile.worker
          load: true
          tags: shiitake-test-worker:e2e
          cache-from: type=gha,scope=shiitake-worker
          cache-to: type=gha,mode=max,scope=shiitake-worker

      - name: 🏗️ Set up the e2e cluster
        run: bash tests/setup.sh

      - name: 🧫 Run end-to-end suite
        run: bash tests/run.sh
