name: 🧪 Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: 🚀 End-to-end (k3d)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: 🧰 Install tools (mise)
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: 🔨 Build server image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile.server
          load: true
          tags: shiitake-server:e2e
          cache-from: type=gha,scope=shiitake-server
          cache-to: type=gha,mode=max,scope=shiitake-server

      - name: 🔨 Build worker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: tests/Dockerfile.worker
          load: true
          tags: shiitake-test-worker:e2e
          cache-from: type=gha,scope=shiitake-worker
          cache-to: type=gha,mode=max,scope=shiitake-worker

      - name: 🏗️ Set up the e2e cluster
        run: bash tests/setup.sh

      - name: 🧫 Run end-to-end suite
        run: bash tests/run.sh
