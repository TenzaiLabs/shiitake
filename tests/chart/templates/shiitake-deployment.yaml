apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: shiitake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shiitake
  template:
    metadata:
      labels:
        app: shiitake
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: server
          image: {{ .Values.server.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.server.port }}
          env:
            - name: SHIITAKE_HOST
              value: "0.0.0.0"
            - name: SHIITAKE_PORT
              value: {{ .Values.server.port | quote }}
            - name: SHIITAKE_DISPATCH_HOST
              value: "127.0.0.1"
            - name: SHIITAKE_DISPATCH_PORT
              value: {{ .Values.server.dispatchPort | quote }}
            - name: SHIITAKE_DEFAULT_WORKDIR
              value: {{ .Values.defaultWorkdir | quote }}
            - name: SHIITAKE_AUTH_TOKEN
              value: {{ .Values.authToken | quote }}
            - name: SHIITAKE_CAPTURE_ROOT
              value: {{ .Values.captureRoot | quote }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel:4318"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: {{ .Values.otel.metricExportIntervalMs | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.server.port }}
            initialDelaySeconds: 1
            periodSeconds: 2
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: capture
              mountPath: {{ .Values.captureRoot }}
        {{- range $i := until (int .Values.worker.count) }}
        - name: worker-{{ $i }}
          image: {{ $.Values.worker.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: SHIITAKE_WORKER_ID
              value: "worker-{{ $i }}"
            - name: SHIITAKE_DISPATCH_PORT
              value: {{ $.Values.server.dispatchPort | quote }}
            - name: SHIITAKE_CAPTURE_ROOT
              value: {{ $.Values.captureRoot | quote }}
          resources:
            {{- toYaml $.Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: capture
              mountPath: {{ $.Values.captureRoot }}
        {{- end }}
      volumes:
        - name: capture
          emptyDir: {}
