# Default e2e profile. Override with `-f` or `--set` to deploy different
# server flavours (e.g. a tighter-memory pool to exercise OOM handling).
authToken: e2e-secret-token
captureRoot: /capture
defaultWorkdir: /tmp

server:
  image: shiitake-server:e2e
  port: 8080
  dispatchPort: 8090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

worker:
  image: shiitake-test-worker:e2e
  count: 8
  # Comma-separated scratch paths the worker empties between commands. Exercises
  # the resident-worker reset path end-to-end in k8s. /dev/mqueue holds POSIX
  # message queues (not SysV, so remove_sysv_ipc skips them) — clearing the dir
  # unlinks the queues a fresh container would have discarded.
  resetPaths: "/tmp,/var/tmp,/dev/shm,/dev/mqueue"
  # Exit (recycle the container) after this many commands. 0 = stay resident
  # and rely on the in-process reset; N>0 adds a periodic full-container
  # teardown. Set >0 to exercise the restartPolicy/recycle path in the e2e.
  restartAfter: 0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Optional in-cluster OpenTelemetry Collector. When enabled, the server exports
# OTLP to it and re-exposes the metrics on a Prometheus endpoint the test run
# scrapes. The short export interval makes metrics show up within a test run.
otel:
  enabled: false
  image: otel/opentelemetry-collector-contrib:latest
  metricExportIntervalMs: 2000
